<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:html="http://www.w3.org/1999/xhtml"
     viewBox="0 0 380 76" width="380" height="76">
  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFEF7"/>
      <stop offset="60%"  stop-color="#FEF7DC"/>
      <stop offset="100%" stop-color="#FDEDB0"/>
    </linearGradient>

    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFE566"/>
      <stop offset="35%"  stop-color="#C8960C"/>
      <stop offset="65%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>

    <radialGradient id="medalFace" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#FFF5B0"/>
      <stop offset="40%"  stop-color="#FFD700"/>
      <stop offset="80%"  stop-color="#C8960C"/>
      <stop offset="100%" stop-color="#9A6E00"/>
    </radialGradient>

    <radialGradient id="medalRing" cx="30%" cy="25%" r="70%">
      <stop offset="0%"   stop-color="#FFE566"/>
      <stop offset="50%"  stop-color="#C8960C"/>
      <stop offset="100%" stop-color="#7A5000"/>
    </radialGradient>

    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="dateBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFD700" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#C8960C" stop-opacity="0.20"/>
    </linearGradient>

    <filter id="cardShadow" x="-3%" y="-5%" width="110%" height="125%">
      <feDropShadow dx="0" dy="3" stdDeviation="4"
                    flood-color="#C8960C" flood-opacity="0.28"/>
    </filter>

    <filter id="medalShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1" dy="3" stdDeviation="3"
                    flood-color="#7A4E00" flood-opacity="0.45"/>
    </filter>

    <filter id="textGlow" x="-5%" y="-30%" width="115%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <pattern id="dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="0.8" fill="#C8960C" opacity="0.12"/>
    </pattern>

  </defs>

  <!-- ── Card ── -->
  <rect x="4" y="5" width="372" height="68" rx="15" fill="#F5C518" opacity="0.12"/>
  <rect x="1.5" y="1.5" width="377" height="73" rx="14"
        fill="url(#bg)" filter="url(#cardShadow)"/>
  <rect x="1.5" y="1.5" width="377" height="73" rx="14" fill="url(#dots)"/>
  <rect x="1.5" y="1.5" width="377" height="73" rx="14"
        fill="none" stroke="url(#borderGrad)" stroke-width="2"/>
  <rect x="5" y="5" width="370" height="66" rx="11"
        fill="none" stroke="#FFD700" stroke-width="0.6" opacity="0.35"/>
  <rect x="1.5" y="1.5" width="377" height="42" rx="14" fill="url(#shine)"/>

  <!-- ── "1" text centered in wreath ── -->
  <text x="44" y="46"
        font-family="'Arial Black', 'Georgia', serif"
        font-size="26" font-weight="900"
        fill="#7A4E00" text-anchor="middle"
        filter="url(#textGlow)">1</text>

